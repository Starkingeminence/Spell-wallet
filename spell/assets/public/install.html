<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <title>Install App | Spell Wallet</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
          sans-serif;
        background: #97eb5d;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }

      .container {
        text-align: center;
        padding: 40px 20px;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      }

      .logo {
        width: 80px;
        height: 80px;
        background: #97eb5d;
        border-radius: 20px;
        margin: 0 auto 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        color: #667eea;
        font-weight: bold;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 15px;
        font-weight: 700;
      }

      .subtitle {
        font-size: 1.2rem;
        margin-bottom: 40px;
        opacity: 0.9;
        line-height: 1.5;
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 30px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 15px;
        text-decoration: none;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        transition: all 0.3s ease;
        border: 2px solid transparent;
        gap: 12px;
      }

      .btn-app-store {
        background: #000;
        color: white;
      }

      .btn-play-store {
        background: #000;
        color: white;
      }

      .btn-web {
        background: #000;
        color: white;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .btn-app-store:hover {
        background: #333;
      }

      .btn-play-store:hover {
        background: #019a66;
      }

      .btn-web:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .btn-telegram {
        background: #000;
        color: white;
      }

      .btn-telegram:hover {
        background: #006ba3;
      }

      .icon {
        width: 24px;
        height: 24px;
      }

      .redirect-notice {
        background: rgba(255, 255, 255, 0.15);
        padding: 15px;
        border-radius: 10px;
        margin-top: 20px;
        font-size: 0.9rem;
        opacity: 0.8;
      }

      @media (max-width: 480px) {
        .container {
          margin: 20px;
          padding: 30px 15px;
        }

        h1 {
          font-size: 2rem;
        }

        .subtitle {
          font-size: 1rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="logo">
        <svg
          width="50"
          height="50"
          viewBox="0 0 96 96"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M96 48.0001C69.4981 48.0188 48.0188 69.4981 47.9999 96C47.9812 69.4981 26.5019 48.0188 -2.09814e-06 48.0001C26.5019 47.9813 47.9812 26.5019 47.9999 -2.09814e-06C48.0188 26.5019 69.4981 47.9813 96 48.0001Z"
            fill="black"
          />
        </svg>
      </div>

      <h1>Get Spell Wallet</h1>

      <p class="subtitle">Install Spell Wallet and enjoy the best experience on your device</p>

      <div class="buttons">
        <a href="#" class="btn btn-play-store" id="playStoreBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.61 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"
            />
          </svg>
          Google Play
        </a>

        <a href="#" class="btn btn-app-store" id="appStoreBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"
            />
          </svg>
          App Store
        </a>

        <a href="#" class="btn btn-web" id="webBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M16.36,14C16.44,13.34 16.5,12.68 16.5,12C16.5,11.32 16.44,10.66 16.36,10H19.74C19.9,10.64 20,11.31 20,12C20,12.69 19.9,13.36 19.74,14M14.59,19.56C15.19,18.45 15.65,17.25 15.97,16H18.92C17.96,17.65 16.43,18.93 14.59,19.56M14.34,14H9.66C9.56,13.34 9.5,12.68 9.5,12C9.5,11.32 9.56,10.65 9.66,10H14.34C14.43,10.65 14.5,11.32 14.5,12C14.5,12.68 14.43,13.34 14.34,14M12,19.96C11.17,18.76 10.5,17.43 10.09,16H13.91C13.5,17.43 12.83,18.76 12,19.96M8,8H5.08C6.03,6.34 7.57,5.06 9.4,4.44C8.8,5.55 8.35,6.75 8,8M5.08,16H8C8.35,17.25 8.8,18.45 9.4,19.56C7.57,18.93 6.03,17.65 5.08,16M4.26,14C4.1,13.36 4,12.69 4,12C4,11.31 4.1,10.64 4.26,10H7.64C7.56,10.66 7.5,11.32 7.5,12C7.5,12.68 7.56,13.34 7.64,14M12,4.03C12.83,5.23 13.5,6.57 13.91,8H10.09C10.5,6.57 11.17,5.23 12,4.03M18.92,8H15.97C15.65,6.75 15.19,5.55 14.59,4.44C16.43,5.07 17.96,6.34 18.92,8M12,2C6.47,2 2,6.5 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"
            />
          </svg>
          Web App
        </a>

        <a href="#" class="btn btn-telegram" id="tgBtn">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M9.78,18.65L10.06,14.42L17.74,7.5C18.08,7.19 17.67,7.04 17.22,7.31L7.74,13.3L3.64,12C2.76,11.75 2.75,11.14 3.84,10.7L19.81,4.54C20.54,4.21 21.24,4.72 20.96,5.84L18.24,18.65C18.05,19.56 17.5,19.78 16.74,19.36L12.6,16.3L10.61,18.23C10.38,18.46 10.19,18.65 9.78,18.65Z"
            />
          </svg>
          Telegram App
        </a>
      </div>

      <div class="redirect-notice" id="redirectNotice" style="display: none">
        <p>
          <strong>Auto-redirecting...</strong><br />We detected your device and are redirecting you
          to the appropriate store.
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@thumbmarkjs/thumbmarkjs@0.20.3/dist/thumbmark.umd.js"></script>

    <script>
      const adjustLocationSearchForLink = (search) => {
        const queryParams = new URLSearchParams(search);
        const rawStartapp = queryParams.get('startapp') || '';

        const parts = rawStartapp.split('__').filter((v) => v !== '');

        const hasUTM = parts.some((part) => {
          const key = part.split('-')[0];

          return key === 'utm' || key.startsWith('utm_');
        });

        if (!rawStartapp || !hasUTM) {
          parts.push('utm_source-installPage');
        }

        const startapp = parts.join('__');

        queryParams.set('startapp', startapp);

        const queryParamsStr = queryParams.toString();

        return queryParamsStr.length > 0 ? `?${queryParamsStr}` : '';
      };

      // Configuration - Replace these URLs with your actual app URLs
      const APP_URLS = {
        ios: 'https://apps.apple.com/us/app/spell-wallet/id6742400366',
        android: `https://play.google.com/store/apps/details?id=com.spellwallet.android&referrer=${encodeURIComponent(adjustLocationSearchForLink(location.search))}`,
        web: `https://app.spellwallet.io${adjustLocationSearchForLink(location.search)}`,
        tg: `https://t.me/spell_wallet_bot/wallet${adjustLocationSearchForLink(location.search)}`,
      };

      const BACKEND_URL = 'https://wallet-api.spell.club/';

      function getFingerprint() {
        ThumbmarkJS.setOption('include', ['fonts', 'locales', 'screen', 'webgl', 'math']);

        return ThumbmarkJS.getFingerprint();
      }

      // Device detection functions
      function isIOS() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent);
      }

      function isAndroid() {
        return /Android/.test(navigator.userAgent);
      }

      function isMobile() {
        return isIOS() || isAndroid();
      }

      // Auto-redirect function
      function autoRedirect() {
        const redirectNotice = document.getElementById('redirectNotice');

        if (isIOS()) {
          redirectNotice.style.display = 'block';
          setTimeout(() => {
            window.location.href = APP_URLS.ios;
          }, 100);
          return true;
        } else if (isAndroid()) {
          redirectNotice.style.display = 'block';
          setTimeout(() => {
            window.location.href = APP_URLS.android;
          }, 100);
          return true;
        }

        return false;
      }

      // Set up button click handlers
      function setupButtons() {
        document.getElementById('appStoreBtn').href = APP_URLS.ios;
        document.getElementById('playStoreBtn').href = APP_URLS.android;
        document.getElementById('webBtn').href = APP_URLS.web;
        document.getElementById('tgBtn').href = APP_URLS.tg;
      }

      // Initialize the page
      function init() {
        setupButtons();

        getFingerprint()
          .then((fingerprint) => {
            if (!isIOS()) return;

            return fetch(`${BACKEND_URL}referral/deeplink`, {
              method: 'POST',
              body: JSON.stringify({
                fingerprint,
                value: adjustLocationSearchForLink(location.search),
              }),
              headers: {
                'Content-Type': 'application/json',
                'x-platform': 'ios',
              },
            }).catch((e) => {
              console.log('save fingerprint error', e);
            });
          })
          .then(() => {
            // Only auto-redirect on mobile devices
            if (isMobile()) {
              // Small delay to let the page load
              setTimeout(autoRedirect, 100);
            }
          });
      }

      // Run when page loads
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

      // Optional: Add click tracking
      document.querySelectorAll('.btn').forEach((btn) => {
        btn.addEventListener('click', function (e) {
          // You can add analytics tracking here
          console.log('Button clicked:', this.textContent.trim());
        });
      });
    </script>
  </body>
</html>
